<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Address Book - Email Application</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: var(--gradient-bg);
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: var(--ghost-white);
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(47, 1, 71, 0.8);
            border-bottom: 2px solid var(--soft-periwinkle);
            backdrop-filter: blur(10px);
            width: 100vw;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
        }

        .header a {
            color: var(--ghost-white);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .header a:hover {
            background: var(--indigo);
        }

        .container {
            margin-top: 100px;
            padding: 30px;
            background: rgba(9, 12, 2, 0.7);
            border: 2px solid var(--soft-periwinkle);
            backdrop-filter: blur(15px);
            color: var(--ghost-white);
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
        }

        .container h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--soft-periwinkle);
            padding-bottom: 10px;
            color: var(--ghost-white);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--indigo);
        }

        th {
            background-color: var(--dark-amethyst);
            font-weight: bold;
            color: var(--ghost-white);
        }

        tr {
            cursor: pointer;
            transition: background 0.3s;
        }

        tr:hover {
            background-color: rgba(153, 132, 212, 0.2);
        }

        .action-bar {
            margin-top: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
            color: black;
            text-decoration: none;
            background-color: var(--soft-periwinkle);
        }
        
        .btn:hover {
            background-color: var(--ghost-white);
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            margin-left: 5px;
        }

        .action-cell {
            display: flex;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <span style="color: var(--ghost-white);">Welcome, </span><span th:text="${user.username}"
                style="font-weight: 800; color: var(--soft-periwinkle);">User</span>
        </div>
        <div>
            <a href="/">Home</a>
            <a href="/profile">Profile</a>
            <a href="/address-book">Address Book</a>
            <a href="/email">Email Mode</a>
            <a href="#" onclick="document.getElementById('logout-form').submit(); return false;">Logout</a>
            <form id="logout-form" th:action="@{/logout}" method="post" style="display: none;"></form>
        </div>
    </div>

    <div class="container">
        <h2>Address Book</h2>

        <div class="action-bar">
            <div>
                <a th:href="@{/address-book/add}" class="btn">Add New Contact</a>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Contact Info</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="contact : ${contacts}">
                    <td th:text="${contact.name}" th:onclick="|window.location.href='/address-book/${contact.id}'|"></td>
                    <td th:text="${contact.email}" th:onclick="|window.location.href='/address-book/${contact.id}'|"></td>
                    <td th:text="${contact.contactInformation}" th:onclick="|window.location.href='/address-book/${contact.id}'|"></td>
                    <td class="action-cell">
                        <a th:href="@{/address-book/edit/{id}(id=${contact.id})}" class="btn btn-small">Edit</a>
                        <form th:action="@{/address-book/delete/{id}(id=${contact.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this contact?');" style="display:inline;">
                            <button type="submit" class="btn btn-small" style="background-color: #ff4c4c; color: white;">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(contacts)}">
                    <td colspan="4" style="text-align: center; color: var(--soft-periwinkle); font-style: italic;">No contacts found in
                        your address book.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
