<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Profile Management - Email Application</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: var(--gradient-bg);
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: var(--ghost-white);
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(47, 1, 71, 0.8);
            border-bottom: 2px solid var(--soft-periwinkle);
            backdrop-filter: blur(10px);
            width: 100vw;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
        }

        .header a {
            color: var(--ghost-white);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .header a:hover {
            background: var(--indigo);
        }

        .profile-container {
            margin-top: 100px;
            padding: 30px;
            background: rgba(9, 12, 2, 0.7);
            border: 2px solid var(--soft-periwinkle);
            backdrop-filter: blur(15px);
            color: var(--ghost-white);
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .profile-container h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--soft-periwinkle);
            padding-bottom: 10px;
            color: var(--ghost-white);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--soft-periwinkle);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: var(--ghost-white);
            border: 1px solid var(--indigo);
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group input:disabled {
            background-color: rgba(0,0,0,0.3);
            color: #888;
            cursor: not-allowed;
            border: 1px solid #444;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            background: var(--soft-periwinkle);
            color: var(--pitch-black);
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--ghost-white);
            color: var(--indigo);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: bold;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <span style="color: var(--ghost-white);">Welcome, </span><span th:text="${user.username}"
                style="font-weight: 800; color: var(--soft-periwinkle);">User</span>
        </div>
        <div>
            <a href="/">Home</a>
            <a href="/profile">Profile</a>
            <a href="/address-book">Address Book</a>
            <a href="/email">Email Mode</a>
            <a href="#" onclick="document.getElementById('logout-form').submit(); return false;">Logout</a>
            <form id="logout-form" th:action="@{/logout}" method="post" style="display: none;"></form>
        </div>
    </div>

    <div class="profile-container">
        <h2>Profile Management</h2>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-warning" th:text="${error}" style="background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;"></div>
        <div th:if="${user.kycStatus == 'PENDING'}" class="alert alert-warning">KYC Approval is Pending. Some features
            may be restricted.</div>

        <form th:action="@{/profile/update}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Name</label>
                <input type="text" th:value="${user.username}" disabled title="Name cannot be changed directly here">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="text" th:value="${user.email}" disabled>
            </div>
            <div class="form-group">
                <label>Wallet Balance</label>
                <input type="text" th:value="${'$' + user.walletBalance}" disabled>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="3" th:text="${user.address}"></textarea>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dateOfBirth" th:value="${user.dateOfBirth != null ? user.dateOfBirth : ''}">
            </div>
            <div class="form-group">
                <label>Preferences</label>
                <textarea name="preferences" rows="2" th:text="${user.preferences}"></textarea>
            </div>

            <div class="form-group">
                <label>ID Proof (Required if changing Address/DoB)</label>
                <input type="file" name="idProof" accept="image/*,.pdf">
            </div>
            <div th:if="${user.idProofPath != null}" style="margin-bottom: 20px; font-size: 0.9em; color: #aaa;">
                <p>Current ID Proof Uploaded: <a th:href="@{${user.idProofPath}}" target="_blank"
                        style="color:var(--soft-periwinkle); text-decoration: none; font-weight: bold;">View Document</a></p>
            </div>

            <button type="submit" class="btn">Save Profile Changes</button>
        </form>
    </div>
</body>

</html>
