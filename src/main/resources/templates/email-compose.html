<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Compose Email - Email Application</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: var(--gradient-bg);
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--ghost-white);
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(47, 1, 71, 0.8);
            border-bottom: 2px solid var(--soft-periwinkle);
            backdrop-filter: blur(10px);
            width: 100vw;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
        }

        .header a {
            color: var(--ghost-white);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .header a:hover {
            background: var(--indigo);
        }

        .container {
            margin-top: 100px;
            padding: 30px;
            background: rgba(9, 12, 2, 0.7);
            border: 2px solid var(--soft-periwinkle);
            backdrop-filter: blur(15px);
            color: var(--ghost-white);
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .container h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--soft-periwinkle);
            padding-bottom: 10px;
            color: var(--ghost-white);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--soft-periwinkle);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
            color: black;
            text-decoration: none;
            background-color: var(--soft-periwinkle);
        }
        
        .btn:hover {
            background-color: var(--ghost-white);
        }

        .cancel-btn {
            background-color: transparent;
            border: 1px solid var(--soft-periwinkle);
            color: var(--soft-periwinkle);
            text-align: center;
            display: inline-block;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <span style="color: var(--ghost-white);">Welcome, </span><span th:text="${user.username}"
                style="font-weight: 800; color: var(--soft-periwinkle);">User</span>
        </div>
        <div>
            <a href="/">Home</a>
            <a href="/profile">Profile</a>
            <a href="/address-book">Address Book</a>
            <a href="/email">Email Mode</a>
            <a href="#" onclick="document.getElementById('logout-form').submit(); return false;">Logout</a>
            <form id="logout-form" th:action="@{/logout}" method="post" style="display: none;"></form>
        </div>
    </div>

    <div class="container">
        <h2>Compose New Email</h2>

        <form th:action="@{/email/send}" th:object="${email}" method="post">
            
            <div class="form-group">
                <label for="receiverEmail">To (Email Address)</label>
                <input type="email" id="receiverEmail" th:field="*{receiverEmail}" required placeholder="user@example.com">
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" th:field="*{subject}" placeholder="Subject">
            </div>

            <div class="form-group">
                <label for="body">Message</label>
                <textarea id="body" th:field="*{body}" rows="8" required placeholder="Type your message here..."></textarea>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn">Send Email</button>
                <a href="/email" class="btn cancel-btn">Cancel</a>
            </div>
        </form>
    </div>
</body>

</html>
