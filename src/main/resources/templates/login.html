<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>
    <section>
        <form th:action="@{/login}" method="post">
            <h1>Login</h1>
            <div class="dialog-row">
                <label th:if="${param.error}" th:text="${session['SPRING_SECURITY_LAST_EXCEPTION'].message}"
                    class="text-center redText" style="color: #ff6b6b; font-weight: bold; margin-bottom: 10px; display: block;"></label>
                <label th:if="${param.registered}" class="text-center"
                    style="color: var(--soft-periwinkle); font-weight: bold; margin-bottom: 10px; display: block;">Registration successful! An email has been sent. Please verify your email before logging in.</label>
            </div>
            <div class="inputbox">
                <ion-icon name="person-outline"></ion-icon>
                <input name="username" type="text" required>
                <label for="">Username/Email</label>
            </div>
            <div class="inputbox">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <input name="password" type="password" id="password" required>
                <label for="">Password</label>
            </div>
            <div class="register">
                <p><a href="#">Forget Password ?</a></p>
            </div>
            <button>Log in</button>
            <div class="register">
                <p>Don't have a account ?<a href="/signup"> Register!!</a></p>
            </div>
        </form>
    </section>
</body>

</html>
